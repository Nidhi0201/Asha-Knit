<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 300" fill="none">
  <!-- Large A letterform -->
  <text x="140" y="195" font-family="Georgia, serif" font-size="220" font-weight="700"
        text-anchor="middle" fill="#1C1410" opacity="0.9">A</text>

  <!-- Crochet hook (diagonal line with hook end) -->
  <line x1="170" y1="40" x2="95" y2="185" stroke="#B8976E" stroke-width="6" stroke-linecap="round"/>
  <path d="M95 185 Q82 198 90 208 Q98 218 108 208" stroke="#B8976E" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Yarn ball at bottom of A -->
  <circle cx="148" cy="210" r="28" fill="none" stroke="#C9968A" stroke-width="3"/>
  <ellipse cx="148" cy="210" rx="28" ry="14" fill="none" stroke="#C9968A" stroke-width="2"/>
  <path d="M120 210 Q148 188 176 210" fill="none" stroke="#C9968A" stroke-width="2"/>
  <path d="M120 210 Q148 232 176 210" fill="none" stroke="#C9968A" stroke-width="2"/>

  <!-- Small heart to the right -->
  <path d="M218 155 Q222 148 228 152 Q234 148 238 155 Q238 162 228 170 Q218 162 218 155Z"
        fill="#C9968A"/>

  <!-- Yarn tail from ball -->
  <path d="M176 210 Q192 215 195 228 Q198 242 185 245"
        stroke="#C9968A" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- ASHA'S KNIT text -->
  <text x="140" y="255" font-family="Georgia, 'Times New Roman', serif" font-size="22"
        font-weight="400" letter-spacing="8" text-anchor="middle" fill="#1C1410">ASHA'S KNIT</text>

  <!-- Decorative line left -->
  <line x1="30" y1="272" x2="90" y2="272" stroke="#B8976E" stroke-width="1"/>
  <!-- Tagline -->
  <text x="140" y="276" font-family="Georgia, serif" font-size="9.5"
        letter-spacing="3.5" text-anchor="middle" fill="#B8976E">CROCHETED WITH LOVE</text>
  <!-- Decorative line right -->
  <line x1="190" y1="272" x2="250" y2="272" stroke="#B8976E" stroke-width="1"/>

  <!-- Small heart below tagline -->
  <path d="M136 285 Q140 280 144 285 Q148 280 152 285 Q152 290 140 298 Q128 290 136 285Z"
        fill="#B8976E" opacity="0.8"/>
</svg>
